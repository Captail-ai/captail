# Captail 前端 nginx 站点配置
# 监听 80，托管静态资源；将 /api 与 /ws 反代到 backend 容器（docker 网络内 hostname=backend）

upstream captail_backend {
  server backend:3000;
  keepalive 32;
}

server {
  listen      80;
  server_name _;

  # 静态资源根目录（由 Dockerfile 拷贝进来）
  root        /usr/share/nginx/html;
  index       index.html;

  # gzip 压缩
  gzip            on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary       on;

  # 客户端上传限制（KYC 文件等可能稍大）
  client_max_body_size 10m;

  # ---------- API 反代 ----------
  # ^~ 让此前缀优先于下方图片/字体的正则 location，
  # 否则 /api/admin/uploads/xxx.jpeg 会被正则截走导致 404。
  location ^~ /api/ {
    proxy_pass         http://captail_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # ---------- WebSocket 反代（必须 Upgrade 头） ----------
  location ^~ /ws {
    proxy_pass         http://captail_backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;   # 长连接保持
    proxy_send_timeout 3600s;
  }

  # ---------- 静态资源 ----------
  # JS/CSS/字体短缓存（项目无 hash 后缀，避免发布后看到旧版）
  location ~* \.(js|css)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }
  # 图片/字体长缓存
  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback：未命中的路径都回 index.html，由前端 hash 路由处理
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 关闭 nginx 版本号显示
  server_tokens off;
}
