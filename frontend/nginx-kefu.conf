# Captail 客服站 nginx 配置
# 静态托管：宿主 /usr/kefu 挂载到容器 /usr/share/nginx/kefu，更新页面无需重建镜像
# 域名：www.captailcn-server.com（与主站 www.captailcn.com 同容器、同 80 端口，靠 server_name 区分）

server {
  listen      80;
  server_name www.captailcn-server.com captailcn-server.com;

  root        /usr/share/nginx/kefu;
  index       index.html;

  gzip            on;
  gzip_min_length 1024;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
  gzip_vary       on;

  client_max_body_size 10m;

  # 静态 JS/CSS 短缓存（项目无 hash 后缀，避免发布后看到旧版）
  location ~* \.(js|css)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }
  # 图片/字体长缓存
  location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback：未命中的路径回退到 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  server_tokens off;
}
