# Captail 生产部署 — 使用 GHCR 上已构建好的镜像
# 用法（在阿里云服务器上）：
#   1. cp .env.example .env  并修改 JWT_SECRET / IMAGE_NAMESPACE
#   2. docker login ghcr.io   （如果镜像设为私有需要登录）
#   3. docker compose pull
#   4. docker compose up -d

services:
  backend:
    image: ${IMAGE_NAMESPACE:-captail}/backend:${IMAGE_TAG:-latest}
    container_name: captail-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      DB_FILE: /app/data/exchange.db
      LOGIN_FAIL_LIMIT: ${LOGIN_FAIL_LIMIT:-5}
      LOGIN_FAIL_WINDOW: ${LOGIN_FAIL_WINDOW:-600}
      LOGIN_LOCK_SECONDS: ${LOGIN_LOCK_SECONDS:-900}
      DEV_AUTO_VERIFY: ${DEV_AUTO_VERIFY:-0}
      MAIL_DEV_ECHO: ${MAIL_DEV_ECHO:-0}
      MAIL_FROM: ${MAIL_FROM:-Captail <captailcn@outlook.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - captail_data:/app/data
    networks: [captail]
    expose:
      - "3000"

  frontend:
    image: ${IMAGE_NAMESPACE:-captail}/frontend:${IMAGE_TAG:-latest}
    container_name: captail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks: [captail]

volumes:
  captail_data:
    driver: local

networks:
  captail:
    driver: bridge
